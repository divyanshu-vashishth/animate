<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Ambient Glow behind the logo -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stick-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="50" cy="50" r="35" fill="url(#glow)"/>
  
  <!-- Skeletal stickman active logo -->
  <!-- Head -->
  <circle cx="50" cy="28" r="8" fill="none" stroke="url(#stick-grad)" stroke-width="4.5"/>
  
  <!-- Spine/Torso -->
  <line x1="50" y1="36" x2="50" y2="58" stroke="url(#stick-grad)" stroke-width="4.5" stroke-linecap="round"/>
  
  <!-- Arms -->
  <line x1="50" y1="40" x2="32" y2="35" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="35" x2="22" y2="45" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round"/>
  
  <line x1="50" y1="40" x2="68" y2="35" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="68" y1="35" x2="78" y2="25" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Legs -->
  <line x1="50" y1="58" x2="38" y2="75" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="38" y1="75" x2="26" y2="80" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round"/>
  
  <line x1="50" y1="58" x2="62" y2="75" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="75" x2="74" y2="82" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Joint Nodes -->
  <circle cx="50" cy="40" r="3.2" fill="#ffffff"/>
  <circle cx="32" cy="35" r="2.8" fill="#ffffff"/>
  <circle cx="22" cy="45" r="2.8" fill="#38bdf8"/>
  <circle cx="68" cy="35" r="2.8" fill="#ffffff"/>
  <circle cx="78" cy="25" r="2.8" fill="#38bdf8"/>
  
  <circle cx="50" cy="58" r="3.2" fill="#ffffff"/>
  <circle cx="38" cy="75" r="2.8" fill="#ffffff"/>
  <circle cx="26" cy="80" r="2.8" fill="#38bdf8"/>
  <circle cx="62" cy="75" r="2.8" fill="#ffffff"/>
  <circle cx="74" cy="82" r="2.8" fill="#38bdf8"/>
</svg>
